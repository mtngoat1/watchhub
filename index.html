<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Watch Hub</title>
    <script src="https://tailwindcss.com"></script>
    <style>
        body { background-color: #0d0e12; color: #f3f4f6; font-family: sans-serif; }
        ::-webkit-scrollbar { height: 8px; width: 8px; }
        ::-webkit-scrollbar-track { background: #111827; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 4px; }
    </style>
</head>
<body class="min-h-screen flex flex-col pb-12">

    <!-- Navbar -->
    <header class="bg-gray-900 border-b border-gray-800 px-6 py-4 flex flex-wrap items-center justify-between gap-4 sticky top-0 z-50">
        <div class="flex items-center space-x-3">
            <span class="text-2xl font-black tracking-wider text-red-500 uppercase">WatchHub</span>
        </div>
        <form id="searchForm" class="flex w-full sm:w-96 max-w-full">
            <input type="text" id="searchInput" placeholder="Search movies or TV shows..." class="w-full bg-gray-800 text-white px-4 py-2 rounded-l-lg border border-gray-700 focus:outline-none focus:border-red-500 text-lg" required />
            <button type="submit" class="bg-red-600 hover:bg-red-700 text-white px-6 py-2 rounded-r-lg font-bold transition text-lg">Search</button>
        </form>
    </header>

    <!-- TV Frame Player -->
    <section id="playerSection" class="hidden w-full max-w-6xl mx-auto px-4 mt-6">
        <div class="bg-gray-900 rounded-xl overflow-hidden shadow-2xl border border-gray-800">
            <div class="p-4 bg-gray-950 flex justify-between items-center border-b border-gray-800">
                <h2 id="playerTitle" class="text-xl font-bold text-white truncate mr-4">Now Playing</h2>
                <button onclick="closePlayer()" class="bg-gray-800 hover:bg-gray-700 text-gray-300 font-bold px-4 py-2 rounded transition">✕ Close Player</button>
            </div>
            <div class="relative w-full aspect-video bg-black">
                <iframe id="videoIframe" src="" class="absolute top-0 left-0 w-full h-full border-0" allowfullscreen scrolling="no"></iframe>
            </div>
        </div>
    </section>

    <!-- Media Grid -->
    <main class="flex-grow max-w-7xl w-full mx-auto px-6 mt-8">
        <h1 id="sectionHeading" class="text-2xl font-extrabold text-white mb-6 border-l-4 border-red-500 pl-3">Trending Media</h1>
        <div id="loadingIndicator" class="hidden flex justify-center items-center py-20"><div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-red-500"></div></div>
        <div id="errorContainer" class="hidden bg-red-900/20 border border-red-500 text-red-200 p-4 rounded-lg my-4 text-center"></div>
        <div id="mediaGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-6"></div>
    </main>

    <script>
        // Use your live Render url inside the quotes below
        const API_BASE_URL = 'https://my-watchhub-backend.onrender.com/'; 

        const mediaGrid = document.getElementById('mediaGrid');
        const sectionHeading = document.getElementById('sectionHeading');
        const searchForm = document.getElementById('searchForm');
        const searchInput = document.getElementById('searchInput');
        const playerSection = document.getElementById('playerSection');
        const playerTitle = document.getElementById('playerTitle');
        const videoIframe = document.getElementById('videoIframe');
        const loadingIndicator = document.getElementById('loadingIndicator');
        const errorContainer = document.getElementById('errorContainer');

        document.addEventListener('DOMContentLoaded', () => loadMedia('/media/trending', 'Trending Now'));

        searchForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const query = encodeURIComponent(searchInput.value.trim());
            if (query) { loadMedia(`/media/searchByName?name=${query}`, `Search Results for "${searchInput.value}"`); closePlayer(); }
        });

        async function loadMedia(endpoint, headingText) {
            showLoading(true); showError(null); sectionHeading.textContent = headingText; mediaGrid.innerHTML = '';
            try {
                const response = await fetch(`${API_BASE_URL}${endpoint}`);
                if (!response.ok) throw new Error('API down or waking up. Free accounts take 1 minute to wake up.');
                const data = await response.json();
                const items = Array.isArray(data) ? data : (data.results || data.media || []);
                if (items.length === 0) { mediaGrid.innerHTML = '<div class="col-span-full text-center text-gray-500 py-12 text-lg">No media found.</div>'; return; }
                items.forEach(item => {
                    const title = item.title || item.name || 'Unknown Title';
                    const image = item.image || item.poster || 'https://placeholder.com';
                    const link = item.link || item.url || '';
                    const card = document.createElement('div');
                    card.className = 'bg-gray-900 rounded-lg overflow-hidden border border-gray-800 hover:border-red-500 transition duration-300 cursor-pointer flex flex-col group';
                    card.innerHTML = `<div class="relative aspect-[2/3] w-full bg-gray-950 overflow-hidden"><img src="${image}" alt="${title}" class="w-full h-full object-cover group-hover:scale-105 transition" loading="lazy"></div><div class="p-3 flex-grow flex flex-col justify-between"><h3 class="font-bold text-sm text-gray-100 group-hover:text-red-400 line-clamp-2 transition">${title}</h3></div>`;
                    card.addEventListener('click', () => playMedia(title, link));
                    mediaGrid.appendChild(card);
                });
            } catch (err) { showError(err.message); } finally { showLoading(false); }
        }

        function playMedia(title, streamUrl) {
            if (!streamUrl) { alert('No video source found.'); return; }
            playerTitle.textContent = `Now Playing: ${title}`;
            videoIframe.src = streamUrl;
            playerSection.classList.remove('hidden');
            playerSection.scrollIntoView({ behavior: 'smooth' });
        }

        function closePlayer() { playerSection.classList.add('hidden'); videoIframe.src = ''; }
        function showLoading(isLoading) { isLoading ? loadingIndicator.classList.remove('hidden') : loadingIndicator.classList.add('hidden'); }
        function showError(msg) { msg ? (errorContainer.textContent = msg, errorContainer.classList.remove('hidden')) : errorContainer.classList.add('hidden'); }
    </script>
</body>
</html>
